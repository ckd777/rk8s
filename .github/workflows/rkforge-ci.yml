name: rkforge CI

on:
  pull_request:
    paths:
      - "project/rkforge/**"
      - "project/common/**"
      - "project/libbridge/**"
      - "project/libipam/**"
      - "project/libruntime/**"
      - "project/libcontainer/**"
      - "project/libcni/**"
      - "project/Cargo.toml"
      - "project/Cargo.lock"
      - ".github/workflows/rkforge-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "project/rkforge/**"
      - "project/common/**"
      - "project/libbridge/**"
      - "project/libipam/**"
      - "project/libruntime/**"
      - "project/libcontainer/**"
      - "project/libcni/**"
      - "project/Cargo.toml"
      - "project/Cargo.lock"
      - ".github/workflows/rkforge-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install nightly rustfmt
        shell: bash
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add rustfmt --toolchain nightly

      - name: Check formatting
        shell: bash
        run: |
          cd project
          cargo +nightly fmt --all --check

  clippy:
    name: Clippy
    runs-on: [self-hosted]
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clippy (rkforge only)
        shell: bash
        run: |
          cd project
          cargo clippy -p rkforge --all-targets -- -D warnings

  tests:
    name: Tests (unit + qlean)
    runs-on: [self-hosted]
    timeout-minutes: 45
    env:
      RUSTUP_TOOLCHAIN: stable
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cargo + qlean
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            project/target
            ~/.local/share/qlean
          key: rkforge-${{ runner.os }}-${{ hashFiles('project/Cargo.lock') }}

      - name: Ensure qlean prerequisites
        shell: bash
        run: |
          set -euo pipefail

          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              qemu-system-x86 \
              qemu-utils \
              libvirt-clients \
              libguestfs-tools \
              xorriso
          fi

          for bin in qemu-system-x86_64 qemu-img virsh guestfish virt-copy-out xorriso sha256sum sha512sum; do
            command -v "$bin" >/dev/null 2>&1 || (echo "missing: $bin" && exit 1)
          done

          if [ ! -e /dev/kvm ]; then
            echo "/dev/kvm is missing; qlean requires KVM on the runner"
            exit 1
          fi

      - name: Configure qemu-bridge-helper for qlean
        shell: bash
        run: |
          set -euo pipefail

          helper=""
          for p in \
            /usr/lib/qemu/qemu-bridge-helper \
            /usr/libexec/qemu/qemu-bridge-helper \
            /usr/libexec/qemu-bridge-helper; do
            if [ -x "$p" ]; then
              helper="$p"
              break
            fi
          done

          if [ -z "$helper" ]; then
            echo "qemu-bridge-helper not found; qlean multi-machine networking may not work"
            exit 1
          fi

          sudo chmod u-s "$helper" || true
          sudo setcap cap_net_admin+ep "$helper"

          sudo mkdir -p /etc/qemu
          echo "allow qlbr0" | sudo tee /etc/qemu/bridge.conf >/dev/null
          sudo chmod 644 /etc/qemu/bridge.conf

      - name: Run rkforge unit tests
        shell: bash
        run: |
          cd project
          cargo test -p rkforge --lib

      - name: Run rkforge fast integration tests
        shell: bash
        run: |
          cd project
          cargo test -p rkforge --test test_image_cmd

      - name: Run rkforge lifecycle test in qlean VM
        shell: bash
        run: |
          cd project
          cargo test -p rkforge --test test_container_lifecycle_qlean -- --nocapture

