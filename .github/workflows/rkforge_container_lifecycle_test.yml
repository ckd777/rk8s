name: rkforge CI

on:
  pull_request:
    paths:
      - "project/rkforge/**"
      - "project/common/**"
      - "project/libbridge/**"
      - "project/libipam/**"
      - "project/libruntime/**"
      - "project/libcontainer/**"
      - "project/libcni/**"
      - "project/Cargo.toml"
      - "project/Cargo.lock"
      - ".github/workflows/rkforge-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install nightly rustfmt
        shell: bash
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add rustfmt --toolchain nightly

      - name: Check formatting
        shell: bash
        run: |
          cd project
          cargo +nightly fmt --all --check

  clippy:
    name: Clippy
    runs-on: [self-hosted]
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clippy (rkforge only)
        shell: bash
        run: |
          cd project
          cargo clippy -p rkforge --all-targets -- -D warnings

  tests:
    name: Tests (unit + qlean)
    runs-on: [self-hosted]
    timeout-minutes: 45
    env:
      RUSTUP_TOOLCHAIN: stable
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache cargo + qlean
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            project/target
            ~/.local/share/qlean
          key: rkforge-${{ runner.os }}-${{ hashFiles('project/Cargo.lock') }}

      - name: Run rkforge unit tests
        shell: bash
        run: |
          cd project
          cargo test -p rkforge --lib

      - name: Run rkforge fast integration tests
        shell: bash
        run: |
          cd project
          cargo test -p rkforge --test test_image_cmd

      - name: Run rkforge lifecycle test in qlean VM
        shell: bash
        run: |
          cd project
          if [ "${{ steps.qlean_prereq.outputs.has_kvm }}" = "true" ]; then
            echo "🚀 Running qlean tests with KVM acceleration"
          else
            echo "🐌 Running qlean tests with TCG emulation (this will be slower)"
          fi
          cargo test -p rkforge --test test_container_lifecycle_qlean -- --nocapture
